server:
  port: 8080

spring:
  application:
    name: realtime-analytics

  # H2 数据库配置（开发环境）
  datasource:
    url: jdbc:h2:mem:analytics;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Spark 配置
spark:
  app-name: realtime-analytics
  master: local[*]
  # 使用 Mock 模式（Java 18+ 兼容）
  mock-mode: true
  # 本地模式使用所有可用 CPU 核心
  # 生产环境可改为: spark://master:7077 或 yarn

  config:
    spark.sql.shuffle.partitions: 4
    spark.driver.memory: 1g
    spark.executor.memory: 1g
    spark.serializer: org.apache.spark.serializer.KryoSerializer
    spark.sql.adaptive.enabled: true

# Actuator 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# OpenAPI 文档配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# 日志配置
logging:
  level:
    root: INFO
    com.example.analytics: DEBUG
    org.apache.spark: WARN
    org.spark_project: WARN
