# ==============================================
# Phase 14: GitHub Actions CI/CD 工作流
# 构建 -> 测试 -> 镜像推送 -> 部署
# ==============================================

name: CI/CD Pipeline

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    # ==================== 构建与测试 ====================
    build:
        name: Build & Test
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"
                  cache: maven

            - name: Build with Maven
              run: mvn -B compile --file pom.xml

            - name: Run Tests
              run: mvn -B test --file pom.xml

            - name: Package
              run: mvn -B package -DskipTests --file pom.xml

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: app-jar
                  path: target/*.jar
                  retention-days: 1

    # ==================== 构建 Docker 镜像 ====================
    docker:
        name: Build Docker Image
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix=
                      type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    # ==================== 部署到 Kubernetes ====================
    deploy:
        name: Deploy to K8s
        runs-on: ubuntu-latest
        needs: docker
        if: github.ref == 'refs/heads/main'
        environment: production

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up kubectl
              uses: azure/setup-kubectl@v3
              with:
                  version: "latest"

            - name: Configure kubectl
              run: |
                  mkdir -p $HOME/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

            - name: Deploy to Kubernetes
              run: |
                  kubectl apply -f k8s/deployment.yaml
                  kubectl -n seckill rollout restart deployment/seckill-app
                  kubectl -n seckill rollout status deployment/seckill-app --timeout=300s

            - name: Verify deployment
              run: |
                  kubectl -n seckill get pods
                  kubectl -n seckill get services
