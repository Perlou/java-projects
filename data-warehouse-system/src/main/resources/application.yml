server:
  port: 8082

spring:
  application:
    name: data-warehouse-system

  datasource:
    url: jdbc:h2:mem:warehousedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# 日志
logging:
  level:
    root: INFO
    com.example.warehouse: DEBUG
    org.hibernate.SQL: DEBUG
